services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: ./api/src
    environment:
      WATCHPACK_POLLING: "true"
      ENV_STAGE: "dev"
  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    stdin_open: true
    tty: true
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: ./app
        - action: rebuild
          path: ./frontend/package.json
    environment:
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: 0
