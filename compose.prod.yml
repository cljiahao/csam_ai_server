services:
  api:
    ports: !override
      - ${API_PORT}
    build:
      context: ./backend
      dockerfile: Dockerfile
      tags:
        - "10.50.0.7:5001/csam_ai_server/api:latest"
        - "10.50.0.7:5001/csam_ai_server/api:2.0.0"
    environment:
      ENV_STAGE: "prod"
  app:
    ports: !override
      - ${APP_PORT}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      tags:
        - "10.50.0.7:5001/csam_ai_server/app:latest"
        - "10.50.0.7:5001/csam_ai_server/app:2.0.0"
  nginx:
    environment:
      API_PORT: ${API_PORT}
      APP_PORT: ${APP_PORT}
